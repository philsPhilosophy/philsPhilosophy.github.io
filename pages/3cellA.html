<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>3-State Totalistic Cellular Automata</title>
  <style>
    body { font-family: system-ui, sans-serif; }
    #automata { display: flex; justify-content: center; margin-top: 20px; }
    canvas { border: 1px solid #000; }
    #rule-config {
      display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin-bottom: 12px;
    }
    .rule-set {
      display: flex; flex-direction: column; align-items: center;
      border: 1px solid #ccc; padding: 8px; border-radius: 8px; width: 140px;
    }
    .rule-title { font-size: 12px; margin-bottom: 6px; text-align: center; }
    .rule-output {
      width: 84px; height: 24px; border: 1px solid #000; cursor: pointer; border-radius: 4px;
      display: flex; align-items: center; justify-content: center; user-select: none;
    }
    #rule-number-display, #controls { text-align: center; margin: 10px 0; }
    #controls label { margin: 0 6px; }
    .btn { margin: 0 4px; padding: 6px 10px; cursor: pointer; }
    .row { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
    .legend {
      font-size: 12px; color: #444; text-align: center; margin: 6px 0 -4px;
    }
  </style>
</head>
<body>
  <h1 style="text-align:center">3-State Totalistic Cellular Automata</h1>

  <!-- Totalistic Rule Configuration (sums 6..0) -->
  <div id="rule-config"></div>
  <div class="legend">Click an output to cycle: 0 → 1 → 2 → 0</div>

  <!-- Calculated rule number (base-3 over 7 digits → decimal) -->
  <div id="rule-number-display">
    Rule Number (ternary over sums 6…0 → decimal): <span id="rule-number">0</span>
  </div>

  <div id="controls">
    <div class="row" style="margin-bottom:8px;">
      <label for="steps">Steps:</label>
      <input type="number" id="steps" min="1" value="60" style="width:80px;">
      <label for="width">Width (cells):</label>
      <input type="number" id="width" min="3" value="120" style="width:90px;">
      <label for="seed-state">Seed State:</label>
      <select id="seed-state">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="0">0</option>
      </select>
      <button class="btn" id="btn-generate">Generate</button>
    </div>

    <div class="row" style="margin-bottom:8px;">
      <label for="state0-color">State 0 Color:</label>
      <input type="color" id="state0-color" value="#FFFFFF">
      <label for="state1-color">State 1 Color:</label>
      <input type="color" id="state1-color" value="#000000">
      <label for="state2-color">State 2 Color:</label>
      <input type="color" id="state2-color" value="#FF0000">
    </div>

    <div class="row">
      <button class="btn" id="btn-random">Randomize Rule</button>
      <button class="btn" id="btn-clear">Clear Rule</button>
      <button class="btn" id="btn-classic">Preset: Round(Average)</button>
    </div>
  </div>

  <div id="automata">
    <canvas id="canvas"></canvas>
  </div>

  <script>
    /*** --- 3-State TOTALISTIC Automaton --- ***/

    // Totalistic: next state depends only on sum (or average) of neighbors.
    // With 3 neighbors (left, center, right) and states in {0,1,2}, the sum S ∈ {0..6}.
    // We present outputs for sums in DESC order: 6,5,4,3,2,1,0 (7 bins total).
    const sumsDesc = [6,5,4,3,2,1,0];

    // ruleArrayTotalistic[idx] ∈ {0,1,2}; length 7, idx 0 corresponds to sum=6, idx 6 to sum=0.
    let ruleArray = new Array(7).fill(0);

    // Color palette from state -> hex (dynamic via inputs)
    function getPalette() {
      return [
        document.getElementById('state0-color').value,
        document.getElementById('state1-color').value,
        document.getElementById('state2-color').value
      ];
    }
    function stateToColor(s) { return getPalette()[s]; }

    // Click to cycle an output mapping for a given sum
    function toggleOutput(index) {
      ruleArray[index] = (ruleArray[index] + 1) % 3;
      const btn = document.getElementById(`output-${index}`);
      btn.style.backgroundColor = stateToColor(ruleArray[index]);
      btn.textContent = ruleArray[index];
      updateRuleNumber();
    }

    // Base-3 over 7 digits (sums 6..0, leftmost most significant) → decimal display
    function updateRuleNumber() {
      const n = ruleArray.reduce((acc, digit) => acc * 3 + digit, 0);
      document.getElementById('rule-number').textContent = n.toString(10);
    }

    function displayRuleConfig() {
      const root = document.getElementById('rule-config');
      root.innerHTML = '';
      sumsDesc.forEach((sum, index) => {
        const wrap = document.createElement('div');
        wrap.className = 'rule-set';

        const title = document.createElement('div');
        title.className = 'rule-title';
        title.innerHTML = `<b>Sum = ${sum}</b> &nbsp; (avg = ${(sum/3).toFixed(2)})`;
        wrap.appendChild(title);

        const out = document.createElement('div');
        out.className = 'rule-output';
        out.id = `output-${index}`;
        out.title = 'Click to cycle 0→1→2';
        out.style.backgroundColor = stateToColor(ruleArray[index]);
        out.textContent = ruleArray[index];
        out.addEventListener('click', () => toggleOutput(index));
        wrap.appendChild(out);

        root.appendChild(wrap);
      });
      updateRuleNumber();
    }

    // When colors change, repaint output tiles
    function refreshConfigColors() {
      ruleArray.forEach((_, i) => {
        const out = document.getElementById(`output-${i}`);
        if (out) {
          out.style.backgroundColor = stateToColor(ruleArray[i]);
        }
      });
    }

    // Evolution step using totalistic ruleArray:
    // For each cell, compute sum = left+center+right; find index = (6 - sum); next = ruleArray[index].
    function generateAutomata() {
      const steps = parseInt(document.getElementById('steps').value, 10);
      const widthCells = parseInt(document.getElementById('width').value, 10);
      const seedState = parseInt(document.getElementById('seed-state').value, 10);
      if (!Number.isFinite(steps) || steps < 1) {
        alert('Please enter a valid number of steps (≥1).'); return;
      }
      if (!Number.isFinite(widthCells) || widthCells < 3) {
        alert('Please enter a valid width (≥3).'); return;
      }

      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');

      const maxCanvas = 700;
      const cellSize = Math.max(1, Math.floor(Math.min(maxCanvas / steps, maxCanvas / widthCells)));

      canvas.width = widthCells * cellSize;
      canvas.height = steps * cellSize;

      const rows = steps, cols = widthCells;
      const grid = Array.from({ length: rows }, () => new Array(cols).fill(0));
      const mid = Math.floor(cols / 2);
      grid[0][mid] = seedState;

      // Evolve (zero boundary; switch to wrap by uncommenting alt lines)
      for (let r = 1; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          // Zero boundary:
          const left   = c > 0        ? grid[r - 1][c - 1] : 0;
          const center = grid[r - 1][c];
          const right  = c < cols - 1 ? grid[r - 1][c + 1] : 0;

          // // Wrapping boundary (use instead if preferred):
          // const left   = grid[r - 1][(c - 1 + cols) % cols];
          // const center = grid[r - 1][c];
          // const right  = grid[r - 1][(c + 1) % cols];

          const sum = left + center + right; // 0..6
          const idx = 6 - sum;               // map sum 6..0 → indices 0..6
          grid[r][c] = ruleArray[idx];
        }
      }

      // Draw
      const palette = getPalette();
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          ctx.fillStyle = palette[grid[r][c]];
          ctx.fillRect(c * cellSize, r * cellSize, cellSize, cellSize);
        }
      }
    }

    /*** --- Helpers / Presets --- ***/
    function randomizeRule() {
      ruleArray = ruleArray.map(() => Math.floor(Math.random() * 3));
      ruleArray.forEach((_, i) => {
        const out = document.getElementById(`output-${i}`);
        out.style.backgroundColor = stateToColor(ruleArray[i]);
        out.textContent = ruleArray[i];
      });
      updateRuleNumber();
    }

    function clearRule() {
      ruleArray = new Array(7).fill(0);
      ruleArray.forEach((_, i) => {
        const out = document.getElementById(`output-${i}`);
        out.style.backgroundColor = stateToColor(0);
        out.textContent = '0';
      });
      updateRuleNumber();
    }

    // Preset: output = round(average)  (i.e., round(sum/3))
    function loadPresetRoundAverage() {
      sumsDesc.forEach((sum, i) => {
        ruleArray[i] = Math.round(sum / 3);
      });
      ruleArray.forEach((_, i) => {
        const out = document.getElementById(`output-${i}`);
        out.style.backgroundColor = stateToColor(ruleArray[i]);
        out.textContent = ruleArray[i];
      });
      updateRuleNumber();
    }

    /*** --- Wire up UI --- ***/
    document.getElementById('btn-generate').addEventListener('click', generateAutomata);
    document.getElementById('btn-random').addEventListener('click', randomizeRule);
    document.getElementById('btn-clear').addEventListener('click', clearRule);
    document.getElementById('btn-classic').addEventListener('click', loadPresetRoundAverage);

    ['state0-color','state1-color','state2-color'].forEach(id => {
      document.getElementById(id).addEventListener('input', refreshConfigColors);
    });

    // Initial render
    displayRuleConfig();
  </script>
</body>
</html>
